services:
  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: naturalisation_tracker
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
    env_file:
      - ./web/.env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mariadb_data:
